{% extends 'grocery/base.html' %}
{% block content %}

<div style="max-width: 420px; margin: 4rem auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--green);">Fresh<span style="color: var(--green-light);">Cart</span></div>
        <p style="color: var(--gray-400); margin-top: 0.5rem; font-size: 0.9rem;">Your family grocery companion</p>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Welcome back</span>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div style="color: var(--red); font-size: 0.8rem; margin-top: 4px;">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--gray-400);">
                Don't have an account? <a href="{% url 'register' %}" style="color: var(--green); font-weight: 500;">Register here</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
